<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}VerifyChain{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
  <div class="noise"></div>

  <header class="topbar">
    <a class="brand" href="{{ url_for('home') }}">
      <span class="brand-icon">⬡</span>
      <span>VerifyChain</span>
    </a>
    <nav>
      <a href="{{ url_for('home') }}">Home</a>
      <a href="{{ url_for('dashboard') }}">Dashboard</a>
      <a href="{{ url_for('integrity') }}">Integrity</a>
      <a href="{{ url_for('scan') }}">Scan QR</a>
      {% if session.get('admin_logged_in') %}
        <a href="{{ url_for('admin') }}">Register</a>
        <a href="{{ url_for('logout') }}" class="nav-logout">Logout</a>
      {% else %}
        <a href="{{ url_for('login') }}" class="nav-login">Admin Login</a>
      {% endif %}
    </nav>
    <div class="chain-status">
      <span class="dot"></span> Chain Active
    </div>
  </header>

  <main class="wrap">{% block content %}{% endblock %}</main>

  <footer class="foot">
    <div class="foot-inner">
      <span class="brand-sm">⬡ VerifyChain</span>
      <span>Blockchain-based product authentication system</span>
      <span>College Project</span>
    </div>
  </footer>
</body>
</html>
