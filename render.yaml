services:
  - type: web
    name: verifychain
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_USER
        value: admin
      - key: ADMIN_PASS
        value: verify123
      - key: PYTHON_VERSION
        value: 3.11.0
